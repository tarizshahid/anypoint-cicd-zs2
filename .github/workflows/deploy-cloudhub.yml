name: Deploy to CloudHub 2.0

on:
  push:
    branches: [ "develop", "main" ]
  workflow_dispatch:

env:
  # Define your master decryption key here
  MULE_KEY: "MySecretKey123"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Anypoint CLI
        run: npm install -g anypoint-cli-v4

      # === 1. DETERMINE ENVIRONMENT FIRST ===
      - name: Determine Environment
        id: set-env
        run: |
          if [[ "${{ github.ref_name }}" == "develop" ]]; then
            echo "PROP_FILE=src/main/resources/sandbox.properties" >> $GITHUB_ENV
          elif [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "PROP_FILE=src/main/resources/design.properties" >> $GITHUB_ENV
          else
            echo "Error: Branch not supported."
            exit 1
          fi

      # === 2. EXTRACT & DECRYPT PROPERTIES FOR MAVEN ===
      - name: Setup Maven Authentication
        run: |
          echo "=== Extracting and Decrypting Credentials for Maven ==="
          # 1. Grab the raw encrypted strings
          ENC_CLIENT_ID_RAW=$(grep "^CLIENT_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          ENC_CLIENT_SECRET_RAW=$(grep "^CLIENT_SECRET=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          
          # 2. Strip out the ![ and ] brackets to get pure encrypted text
          ENC_CLIENT_ID=$(echo "$ENC_CLIENT_ID_RAW" | sed 's/!\[//;s/\]//')
          ENC_CLIENT_SECRET=$(echo "$ENC_CLIENT_SECRET_RAW" | sed 's/!\[//;s/\]//')
          
          # 3. Decrypt on the fly using the JAR file
          export ANYPOINT_CLIENT_ID=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_CLIENT_ID")
          export ANYPOINT_CLIENT_SECRET=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_CLIENT_SECRET")
          
          echo "=== Creating settings.xml ==="
          cat <<EOF > settings.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <settings xmlns="http://maven.apache.org/SETTINGS/1.0.0"
                    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                    xsi:schemaLocation="http://maven.apache.org/SETTINGS/1.0.0 http://maven.apache.org/xsd/settings-1.0.0.xsd">
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>~~~Client~~~</username>
                <password>$ANYPOINT_CLIENT_ID~?~$ANYPOINT_CLIENT_SECRET</password>
              </server>
            </servers>
          </settings>
          EOF

      # === 3. BUILD PHASE ===
      - name: Build Clean Application
        # Added -U to force clean dependency downloads
        run: mvn clean package -s settings.xml -DskipTests -U

      # === 4. CI/CD EXECUTION PHASE ===
      - name: CI/CD Execution
        run: |
          set -e

          echo "=== Extracting and Decrypting Connected App Credentials ==="
          ENC_CLIENT_ID_RAW=$(grep "^CLIENT_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          ENC_CLIENT_SECRET_RAW=$(grep "^CLIENT_SECRET=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          
          ENC_CLIENT_ID=$(echo "$ENC_CLIENT_ID_RAW" | sed 's/!\[//;s/\]//')
          ENC_CLIENT_SECRET=$(echo "$ENC_CLIENT_SECRET_RAW" | sed 's/!\[//;s/\]//')
          
          export ANYPOINT_CLIENT_ID=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_CLIENT_ID")
          export ANYPOINT_CLIENT_SECRET=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_CLIENT_SECRET")
          
          echo "=== Extracting Standard Properties ==="
          ORG_ID=$(grep "^ORG_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          ENV_NAME=$(grep "^ENV_NAME=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          TARGET_ID=$(grep "^TARGET_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          APP_NAME=$(grep "^APP_NAME=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          RUNTIME=$(grep "^RUNTIME_VERSION=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          APP_ASSET_ID=$(grep "^APP_ASSET_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          APP_ASSET_VERSION=$(grep "^APP_ASSET_VERSION=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          SPEC_ASSET_ID=$(grep "^SPEC_ASSET_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)
          SPEC_VERSION=$(grep "^SPEC_VERSION=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r' | xargs)

          echo "=== Extracting and Decrypting CloudHub Environment Credentials ==="
          ENC_ENV_ID_RAW=$(grep "^ENV_CLIENT_ID=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          ENC_ENV_SECRET_RAW=$(grep "^ENV_CLIENT_SECRET=" $PROP_FILE | cut -d'=' -f2 | tr -d '\r')
          
          ENC_ENV_ID=$(echo "$ENC_ENV_ID_RAW" | sed 's/!\[//;s/\]//')
          ENC_ENV_SECRET=$(echo "$ENC_ENV_SECRET_RAW" | sed 's/!\[//;s/\]//')
          
          ENV_CLIENT_ID=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_ENV_ID")
          ENV_CLIENT_SECRET=$(java -cp utils/secure-properties-tool.jar com.mulesoft.tools.SecurePropertiesTool string decrypt Blowfish CBC "$MULE_KEY" "$ENC_ENV_SECRET")

          JAR_FILE=$(find target -maxdepth 1 -name "*.jar" | head -n 1)

          echo "=== Step 1: Exchange Upload (Smart Check) ==="
          set +e
          if anypoint-cli-v4 exchange:asset:describe $ORG_ID/$APP_ASSET_ID/$APP_ASSET_VERSION > /dev/null 2>&1; then
            echo "Asset $APP_ASSET_ID v$APP_ASSET_VERSION exists. Skipping upload."
          else
            echo "Uploading new implementation to Exchange..."
            anypoint-cli-v4 exchange:asset:upload $ORG_ID/$APP_ASSET_ID/$APP_ASSET_VERSION \
              --files="{\"mule-application.jar\": \"$JAR_FILE\"}" \
              --type="app" \
              --name="$APP_ASSET_ID"
          fi
          set -e

          echo "=== Step 2: Fetch/Create Autodiscovery ID ==="
          set +e
          API_ID=$(anypoint-cli-v4 api-mgr:api:list --environment "$ENV_NAME" -o json | \
            jq -r '.[] | select(.assetId == "'"$SPEC_ASSET_ID"'" and .assetVersion == "'"$SPEC_VERSION"'") | .id' | head -n 1)
          set -e
          
          if [[ -z "$API_ID" || "$API_ID" == "null" ]]; then
            echo "No existing API instance found. Creating..."
            API_JSON=$(anypoint-cli-v4 api-mgr:api:manage "$SPEC_ASSET_ID" "$SPEC_VERSION" --type raml --muleVersion4OrAbove --environment "$ENV_NAME" -o json)
            API_ID=$(echo "$API_JSON" | jq -r '.id // .message' | grep -Eo '[0-9]+' | head -n 1)
          else
            echo "Existing API instance found. Reusing ID: $API_ID"
          fi
          
          if [[ -z "$API_ID" || "$API_ID" == "null" ]]; then
            echo "ERROR: Could not extract API_ID."
            exit 1
          fi
          echo "Using API ID: $API_ID"

          echo "=== Step 3: Apply Basic Auth Policy ==="
          POLICY_CONFIG="{\"username\":\"$ANYPOINT_CLIENT_ID\",\"password\":\"$ANYPOINT_CLIENT_SECRET\"}"
          set +e
          anypoint-cli-v4 api-mgr:policy:apply "$API_ID" http-basic-authentication \
            --groupId "68ef9520-24e9-4cf2-b2f5-620025690913" \
            --policyVersion "1.3.2" \
            --environment "$ENV_NAME" \
            --config "$POLICY_CONFIG"
          set -e

          echo "=== Step 4: Deploy with Injected Properties ==="
          set +e
          APP_UUID=$(anypoint-cli-v4 runtime-mgr:application:list --environment "$ENV_NAME" -o json | jq -r '.. | objects | select(.name? == "'"$APP_NAME"'") | .id' 2>/dev/null | grep -v null | head -n 1 || true)
          set -e

          # Note the injection of the secure.key property here so CloudHub can decrypt ENV credentials!
          if [[ -z "$APP_UUID" || "$APP_UUID" == "null" ]]; then
            anypoint-cli-v4 runtime-mgr:application:deploy "$APP_NAME" "$TARGET_ID" "$RUNTIME" "$APP_ASSET_ID" \
              --assetVersion "$APP_ASSET_VERSION" \
              --groupId "$ORG_ID" \
              --environment "$ENV_NAME" \
              --property "anypoint.platform.client_id:$ENV_CLIENT_ID" \
              --property "anypoint.platform.client_secret:$ENV_CLIENT_SECRET" \
              --property "api.id:$API_ID" \
              --property "secure.key:$MULE_KEY"
          else
            anypoint-cli-v4 runtime-mgr:application:modify "$APP_UUID" \
              --artifactId "$APP_ASSET_ID" \
              --assetVersion "$APP_ASSET_VERSION" \
              --groupId "$ORG_ID" \
              --environment "$ENV_NAME" \
              --property "anypoint.platform.client_id:$ENV_CLIENT_ID" \
              --property "anypoint.platform.client_secret:$ENV_CLIENT_SECRET" \
              --property "api.id:$API_ID" \
              --property "secure.key:$MULE_KEY"
          fi